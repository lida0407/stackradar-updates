name: Daily intel refresh

on:
  schedule:
    # 05:17 UTC daily — CISA KEV and endoflife.date update on US business days
    - cron: "17 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build intel feeds (CISA KEV + endoflife.date)
        run: python3 tools/build_intel_feeds.py --catalog catalog.json --manifest update-manifest.json

      - name: Commit and publish release assets if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet catalog.json update-manifest.json; then
            echo "No feed changes today."
            exit 0
          fi
          git config user.name "stackradar-intel-bot"
          git config user.email "actions@users.noreply.github.com"
          git add catalog.json update-manifest.json
          git commit -m "Daily intel refresh: $(python3 -c "import json;print(json.load(open('update-manifest.json'))['database']['notes'])")"
          git push
          tag="$(gh release list --limit 1 --json tagName --jq '.[0].tagName')"
          if [ -n "$tag" ]; then
            gh release upload "$tag" catalog.json update-manifest.json --clobber
            echo "Updated release assets on $tag"
          else
            echo "No release found to attach assets to." >&2
            exit 1
          fi
